services:
  tokeninside:
    image: voidintheshell/tokeninside:b0-20260702-1526
    restart: unless-stopped
    pull_policy: always
    env_file:
      - .env.production
    ports:
      - "16878:16878"
    volumes:
      - tokeninside_data:/app/.local-data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:16878/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  tokeninside_data:
