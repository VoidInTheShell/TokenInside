# TokenInside production compose example.
#
# PostgreSQL tuning values live in `.env`; keep `scripts/postgres-tuning-entrypoint.sh`
# next to this compose file when deploying.

services:
  postgres:
    image: postgres:16-alpine
    container_name: tokeninside-postgres
    restart: unless-stopped
    env_file:
      - ${TOKENINSIDE_ENV_FILE:-.env}
    environment:
      POSTGRES_DB: tokeninside
      POSTGRES_USER: tokeninside
    entrypoint: ["sh", "/usr/local/bin/tokeninside-postgres-entrypoint.sh"]
    shm_size: "${TOKENINSIDE_POSTGRES_SHM_SIZE:?set TOKENINSIDE_POSTGRES_SHM_SIZE in .env}"
    cpus: "${TOKENINSIDE_POSTGRES_CPUS:?set TOKENINSIDE_POSTGRES_CPUS in .env}"
    mem_limit: "${TOKENINSIDE_POSTGRES_MEM_LIMIT:?set TOKENINSIDE_POSTGRES_MEM_LIMIT in .env}"
    mem_reservation: "${TOKENINSIDE_POSTGRES_MEM_RESERVATION:?set TOKENINSIDE_POSTGRES_MEM_RESERVATION in .env}"
    volumes:
      - ./scripts/postgres-tuning-entrypoint.sh:/usr/local/bin/tokeninside-postgres-entrypoint.sh:ro
      - tokeninside_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tokeninside -d tokeninside"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      tokeninside_net:
        aliases:
          - postgres

  tokeninside:
    image: ${TOKENINSIDE_IMAGE:-ghcr.io/voidintheshell/tokeninside:production}
    container_name: tokeninside
    restart: unless-stopped
    env_file:
      - ${TOKENINSIDE_ENV_FILE:-.env}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "16878"
    cpus: "${TOKENINSIDE_APP_CPUS:?set TOKENINSIDE_APP_CPUS in .env}"
    mem_limit: "${TOKENINSIDE_APP_MEM_LIMIT:?set TOKENINSIDE_APP_MEM_LIMIT in .env}"
    mem_reservation: "${TOKENINSIDE_APP_MEM_RESERVATION:?set TOKENINSIDE_APP_MEM_RESERVATION in .env}"
    volumes:
      - tokeninside_app_data:/app/.local-data
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:16878/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      tokeninside_net:
        aliases:
          - tokeninside

volumes:
  tokeninside_app_data:
    name: tokeninside_app_data
  tokeninside_pg_data:
    name: tokeninside_pg_data

networks:
  tokeninside_net:
    external: true
