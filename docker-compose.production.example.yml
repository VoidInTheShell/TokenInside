services:
  postgres:
    image: postgres:16-alpine
    container_name: tokeninside-postgres
    restart: unless-stopped
    env_file:
      - ${TOKENINSIDE_ENV_FILE:-.env.production}
    environment:
      POSTGRES_DB: tokeninside
      POSTGRES_USER: tokeninside
    command:
      - postgres
      - -c
      - max_connections=30
      - -c
      - superuser_reserved_connections=3
      - -c
      - shared_buffers=256MB
      - -c
      - effective_cache_size=768MB
      - -c
      - work_mem=4MB
      - -c
      - maintenance_work_mem=64MB
      - -c
      - checkpoint_timeout=10min
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - max_wal_size=512MB
      - -c
      - min_wal_size=128MB
      - -c
      - wal_buffers=16MB
      - -c
      - wal_compression=on
      - -c
      - autovacuum=on
      - -c
      - autovacuum_max_workers=2
      - -c
      - autovacuum_naptime=30s
      - -c
      - autovacuum_vacuum_scale_factor=0.05
      - -c
      - autovacuum_analyze_scale_factor=0.02
      - -c
      - autovacuum_vacuum_threshold=50
      - -c
      - autovacuum_analyze_threshold=50
      - -c
      - idle_in_transaction_session_timeout=30s
      - -c
      - statement_timeout=30s
      - -c
      - lock_timeout=5s
      - -c
      - log_min_duration_statement=500ms
    shm_size: 128m
    cpus: "1.0"
    mem_limit: 768m
    mem_reservation: 512m
    volumes:
      - tokeninside_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tokeninside -d tokeninside"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      tokeninside_net:
        aliases:
          - postgres

  tokeninside:
    image: voidintheshell/tokeninside:latest
    container_name: tokeninside
    restart: unless-stopped
    env_file:
      - ${TOKENINSIDE_ENV_FILE:-.env.production}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "16878"
    cpus: "0.75"
    mem_limit: 768m
    mem_reservation: 512m
    volumes:
      - tokeninside_app_data:/app/.local-data
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:16878/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      tokeninside_net:
        aliases:
          - tokeninside

volumes:
  tokeninside_app_data:
    name: tokeninside_app_data
  tokeninside_pg_data:
    name: tokeninside_pg_data

networks:
  tokeninside_net:
    external: true
