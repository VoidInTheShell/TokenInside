name: TokenInside CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      deploy_production:
        description: "Deploy the selected image to the production environment"
        required: false
        type: boolean
        default: false
      image_tag:
        description: "Optional image tag to deploy, for example sha-abcdef1 or v2026.07.08-1"
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: voidintheshell/tokeninside

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build application
        run: npm run build

      - name: Create compose validation env
        run: |
          cat > .env.ci <<'EOF'
          TOKENINSIDE_ENV_FILE=.env.ci
          TOKENINSIDE_IMAGE=ghcr.io/voidintheshell/tokeninside:ci
          TOKENINSIDE_POSTGRES_SHM_SIZE=128m
          TOKENINSIDE_POSTGRES_CPUS=1.0
          TOKENINSIDE_POSTGRES_MEM_LIMIT=768m
          TOKENINSIDE_POSTGRES_MEM_RESERVATION=512m
          TOKENINSIDE_APP_CPUS=0.75
          TOKENINSIDE_APP_MEM_LIMIT=768m
          TOKENINSIDE_APP_MEM_RESERVATION=512m
          EOF

      - name: Validate production compose template
        run: docker compose --env-file .env.ci -f docker-compose.production.example.yml config --quiet

  build-and-push:
    name: Build and Push Image
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.image.outputs.image }}
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=tag
            type=raw,value=staging,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=production,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=manual,enable=${{ github.event_name == 'workflow_dispatch' }}
          labels: |
            org.opencontainers.image.source=https://github.com/VoidInTheShell/TokenInside

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Select commit image
        id: image
        run: |
          short_sha="${GITHUB_SHA::7}"
          echo "image=${REGISTRY}/${IMAGE_NAME}:sha-${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Verify migration runtime
        env:
          TOKENINSIDE_IMAGE: ${{ steps.image.outputs.image }}
        run: |
          set -euo pipefail
          docker pull "$TOKENINSIDE_IMAGE"
          docker run --rm --entrypoint node "$TOKENINSIDE_IMAGE" --input-type=module \
            -e "await import('pg'); await import('redis'); await import('./lib/billing/package-repository.ts'); await import('./lib/redis-runtime.ts'); await import('node:fs/promises').then(async ({ access }) => { await access('scripts/db-migrate.mjs'); await access('scripts/production-preflight.mjs'); })"

  deploy-staging:
    name: Deploy Staging
    runs-on: [self-hosted, linux, x64, tokeninside-la, staging]
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    environment: staging
    concurrency:
      group: tokeninside-staging-deploy
      cancel-in-progress: false
    steps:
      - name: Check out deployment files
        uses: actions/checkout@v4

      - name: Deploy on LA staging runner
        env:
          TOKENINSIDE_IMAGE: ${{ needs.build-and-push.outputs.image }}
          DEPLOY_DIR: ${{ vars.DEPLOY_DIR }}
          APP_URL: ${{ vars.APP_URL }}
        run: |
          set -euo pipefail
          : "${DEPLOY_DIR:?staging DEPLOY_DIR is required}"
          release_dir="${DEPLOY_DIR}/.release-source/${GITHUB_SHA}"
          install -d -m 0750 "$release_dir/scripts"
          install -m 0644 docker-compose.yml "$release_dir/docker-compose.yml"
          install -m 0644 scripts/postgres-tuning-entrypoint.sh "$release_dir/scripts/postgres-tuning-entrypoint.sh"
          export RELEASE_DIR="$release_dir"
          export RELEASE_ID="$GITHUB_SHA"
          bash scripts/deploy-la.sh

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.deploy_production)
    environment: production
    concurrency:
      group: tokeninside-production-deploy
      cancel-in-progress: false
    steps:
      - name: Select production image
        id: production-image
        env:
          INPUT_IMAGE_TAG: ${{ inputs.image_tag }}
          BUILD_IMAGE: ${{ needs.build-and-push.outputs.image }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ -n "$INPUT_IMAGE_TAG" ]; then
            image="${REGISTRY}/${IMAGE_NAME}:${INPUT_IMAGE_TAG}"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            image="${REGISTRY}/${IMAGE_NAME}:${REF_NAME}"
          else
            image="$BUILD_IMAGE"
          fi
          echo "image=$image" >> "$GITHUB_OUTPUT"

      - name: Deploy over SSH
        env:
          TOKENINSIDE_IMAGE: ${{ steps.production-image.outputs.image }}
          SSH_HOST: ${{ vars.SSH_HOST }}
          SSH_PORT: ${{ vars.SSH_PORT }}
          SSH_USER: ${{ vars.SSH_USER }}
          DEPLOY_DIR: ${{ vars.DEPLOY_DIR }}
          APP_URL: ${{ vars.APP_URL }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -eu
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/tokeninside_deploy
          chmod 600 ~/.ssh/tokeninside_deploy
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts
          ssh -i ~/.ssh/tokeninside_deploy -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "TOKENINSIDE_IMAGE='$TOKENINSIDE_IMAGE' DEPLOY_DIR='$DEPLOY_DIR' bash -s" <<'REMOTE'
          set -eu
          cd "$DEPLOY_DIR"
          mkdir -p .deploy
          previous="$(cat .deploy/current-image 2>/dev/null || true)"
          printf '%s\n' "$previous" > .deploy/previous-image
          rollback() {
            if [ -n "$previous" ]; then
              export TOKENINSIDE_IMAGE="$previous"
              docker compose --env-file .env -f docker-compose.yml pull tokeninside
              docker compose --env-file .env -f docker-compose.yml up -d --no-deps tokeninside
            fi
          }
          trap rollback ERR
          export TOKENINSIDE_IMAGE
          docker compose --env-file .env -f docker-compose.yml pull tokeninside
          docker compose --env-file .env -f docker-compose.yml up -d --no-deps tokeninside
          curl -fsS http://127.0.0.1:16878/api/health
          printf '%s\n' "$TOKENINSIDE_IMAGE" > .deploy/current-image
          printf '%s\n' "$TOKENINSIDE_IMAGE" > .deploy/last-successful-image
          printf '%s %s\n' "$(date -Is)" "$TOKENINSIDE_IMAGE" >> .deploy/releases.log
          trap - ERR
          REMOTE
          if [ -n "$APP_URL" ]; then
            curl -fsS "$APP_URL/api/health"
          fi
